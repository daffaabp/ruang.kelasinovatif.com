<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - KelasInovatif</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#10B981",
                        "primary-hover": "#059669",
                        "deep-green": "#064E3B",
                        "background-dark": "#022C22",
                        "card-dark": "#134E4A",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                        sans: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(16, 185, 129, 0.5)',
                        'card': '0 20px 40px -5px rgba(0, 0, 0, 0.2)',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                },
            },
        };
    </script>
    <style>
        .geometric-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
        }
    </style>
</head>

<body
    class="bg-background-dark font-sans text-slate-800 antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute inset-0 bg-background-dark z-0"></div>
    <div class="absolute inset-0 geometric-pattern z-0 opacity-50 pointer-events-none"></div>
    <div
        class="absolute top-[-10%] left-[-5%] w-[600px] h-[600px] bg-emerald-900/40 rounded-full blur-[100px] mix-blend-screen animate-pulse z-0">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-5%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] mix-blend-screen z-0">
    </div>
    <svg class="absolute top-0 right-0 w-1/2 h-full opacity-5 pointer-events-none z-0" preserveAspectRatio="none"
        viewBox="0 0 100 100">
        <path d="M100 0 L0 100 L100 100 Z" fill="white"></path>
    </svg>
    <main class="w-full max-w-md px-4 relative z-10">
        <div
            class="bg-white rounded-2xl shadow-card p-8 md:p-10 transform transition-all hover:scale-[1.005] duration-500">
            <div class="flex items-center justify-center gap-2 mb-8">
                <span class="material-icons-round text-primary text-4xl">school</span>
                <span class="text-gray-900 text-2xl font-extrabold tracking-tight">KelasInovatif</span>
            </div>
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Login</h1>
                <p class="text-gray-500 text-sm">Welcome back! Please enter your details</p>
            </div>
            <form class="space-y-5" onsubmit="event.preventDefault();">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5" for="email">Email</label>
                    <input
                        class="block w-full px-4 py-3 rounded-xl border-gray-200 text-gray-900 placeholder-gray-400 focus:border-primary focus:ring-primary sm:text-sm transition-colors duration-200 ease-in-out bg-gray-50/50 focus:bg-white"
                        id="email" name="email" placeholder="johndoe@mail.com" required="" type="email" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5" for="password">Password</label>
                    <div class="relative">
                        <input
                            class="block w-full px-4 py-3 rounded-xl border-gray-200 text-gray-900 placeholder-gray-400 focus:border-primary focus:ring-primary sm:text-sm transition-colors duration-200 ease-in-out bg-gray-50/50 focus:bg-white pr-10"
                            id="password" name="password" required="" type="password" />
                        <button
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors focus:outline-none"
                            type="button">
                            <span class="material-icons-round text-xl">visibility_off</span>
                        </button>
                    </div>
                </div>
                <div class="pt-2">
                    <button
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-300 transform hover:-translate-y-0.5"
                        type="submit">
                        Login
                    </button>
                </div>
            </form>
            <div class="mt-8 text-center">
                <p class="text-sm text-gray-600">
                    Don't have an account?
                    <a class="font-semibold text-primary hover:text-primary-hover transition-colors ml-1"
                        href="#">Register</a>
                </p>
            </div>
        </div>
        <div class="mt-8 text-center">
            <p class="text-emerald-100/40 text-xs">© 2024 KelasInovatif. All rights reserved.</p>
        </div>
    </main>
</body>

</html>
